services:
  - type: web
    name: isum-preparativos
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ISUM_PASSWORD
        value: isum2024
      - key: DATABASE_URL
        sync: false
